---

hazzuk_core_traefik_enabled: false

hazzuk_core_traefik_stack_defaults:
  traefik:
    image: docker.io/traefik # -8<- [end:x]
    version: v3.6.15@sha256:8cb20d16e01a53d8d7f7696ac2f1af7d200d5c9984d226ce2299731d9eab6d6c # -8<- [end:x]
    log_level: debug # trace, debug, info, warn, error, fatal, panic
    acme:
      staging_enabled: true
      email: cert@example.com
      staging_ca_server_url: "https://acme-staging-v02.api.letsencrypt.org/directory" # -8<- [end:x]
      live_ca_server_url: "https://acme-v02.api.letsencrypt.org/directory" # "https://acme.zerossl.com/v2/DV90" # -8<- [end:x]
      zone_api_token: ""
      dns_api_token: ""
    dashboard:
      enabled: true
      forward_auth_enabled: true
      domain: "traefik.{{ karo_compose_root_domain }}"
    custom_domains_raw: |
      # - main: "*.int.{{ karo_compose_root_domain }}"
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth # -8<- [end:x]
    version: v5.0.7-distroless@sha256:e31ae2bac566cfe4687a8a54121a884ce25c4869995075f8e7e3d352bcd59241 # -8<- [end:x]
    domain: "tinyauth.{{ karo_compose_root_domain }}"
    log_level: info # trace, debug, info, warn, error, fatal, panic
    oidc:
      client_id: ""
      client_secret: ""
  cetusguard:
    image: docker.io/hectorm/cetusguard # -8<- [end:x]
    version: v1.1.3@sha256:b3dc5d2042869dd714c75985d94bb8c259df53b325ec6b1a2b57bcc3eac17689 # -8<- [end:x]
    log_level: 7 # 0-7 (min to max verbosity)
